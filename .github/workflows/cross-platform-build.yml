name: Cross-platform Build Readiness
on:
  workflow_dispatch:
  push:
    branches: [master, main]
    tags: ["v*"]
  pull_request:
jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            target: mac
          - os: ubuntu-latest
            target: linux
    runs-on: ${{ matrix.os }}
    timeout-minutes: 35
    env:
      CSC_IDENTITY_AUTO_DISCOVERY: "false"
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: 24, cache: npm }
      - run: npm ci
      - run: npm test
      - run: npm run build:renderer
      - run: npm run build:cli-resources
      - run: npm run build:app-resources
      - name: Build unsigned application
        if: github.event_name == 'workflow_dispatch' || startsWith(github.ref, 'refs/tags/v')
        shell: bash
        run: npx electron-builder --projectDir .cache/app-runtime --config ../../electron-builder.runtime.js --${{ matrix.target }} --publish never
      - name: Verify packaged resources
        if: github.event_name == 'workflow_dispatch' || startsWith(github.ref, 'refs/tags/v')
        shell: bash
        env:
          CODEARTS_BAR_DIST_DIR: dist
        run: |
          npm run smoke:app-asar
          npm run smoke:package-resources
      - uses: actions/upload-artifact@v4
        if: github.event_name == 'workflow_dispatch' || startsWith(github.ref, 'refs/tags/v')
        with:
          name: codearts-bar-${{ matrix.target }}-${{ github.sha }}
          path: dist/*
          if-no-files-found: error
