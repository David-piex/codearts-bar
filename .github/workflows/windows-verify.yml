name: Windows Verify
on:
  push:
    branches: [master, main, "codex/**"]
  pull_request:
  workflow_dispatch:
concurrency:
  group: windows-verify-${{ github.ref }}
  cancel-in-progress: true

env:
  CI: "1"
  CSC_IDENTITY_AUTO_DISCOVERY: "false"
  ELECTRON_DISABLE_SECURITY_WARNINGS: "1"
  CODEARTS_BAR_NOW_MS: "1783512000000"
  SOURCE_DATE_EPOCH: "1783512000"

jobs:
  core:
    runs-on: windows-latest
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: 24, cache: npm }
      - run: npm ci
      - run: npm audit
      - run: npm test
      - run: npm run build:renderer
      - run: npm run coverage
      - run: node tests/quality-metrics.js
      - run: node tests/quality-trend.js --skip-jetbrains
      - uses: actions/upload-artifact@v4
        with:
          name: quality-metrics
          path: |
            .cache/quality-metrics.json
            .cache/quality-trend.json
            quality-baseline.json

  vscode:
    runs-on: windows-latest
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: 24, cache: npm }
      - run: npm ci
      - run: npm run prepare:extension
      - run: npm run e2e:vscode
      - run: npm run build:extension
      - uses: actions/upload-artifact@v4
        with: { name: vscode-extension, path: release/codearts-bar-status.vsix }

  jetbrains:
    runs-on: windows-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: 24, cache: npm }
      - uses: actions/setup-java@v4
        with: { distribution: temurin, java-version: "21", cache: gradle }
      - run: npm ci
      - name: Verify JetBrains compile and plugin
        run: npm run verify:jetbrains
      - run: node tests/quality-jetbrains.js
      - uses: actions/upload-artifact@v4
        if: always()
        with: { name: jetbrains-plugin, path: jetbrains-plugin/build/distributions/*.zip }
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: jetbrains-diagnostics
          path: |
            jetbrains-plugin/build/reports/**
            jetbrains-plugin/build/test-results/**
            jetbrains-plugin/build/idea-sandbox/**/log/**
          if-no-files-found: ignore

  stress:
    runs-on: windows-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: 24, cache: npm }
      - run: npm ci
      - run: npm run stress:dashboard
      - run: npm run stress:pagination
      - run: npm run stress:aggregation

  package-windows:
    needs: [core, vscode, jetbrains, stress]
    runs-on: windows-latest
    timeout-minutes: 35
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: 24, cache: npm }
      - run: npm ci
      - run: npm run build:renderer
      - run: npm run build:app:built
      - run: npm run smoke:app-asar
      - run: npm run smoke:package-resources
      - run: npm run pack:npm
      - run: npm run screenshot:vscode:prepared
      - run: npm run screenshot:electron:built
      - run: node tests/visual-regression.js
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: codearts-bar-windows-${{ github.sha }}
          path: |
            dist/CodeArts-Bar-Setup-*-x64.exe
            dist/CodeArts-Bar-Portable-*-x64.exe
            release/codearts-bar-*.tgz
            .cache/visual-regression
          if-no-files-found: warn
          retention-days: 7
