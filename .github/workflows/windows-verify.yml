name: Windows Verify

on:
  push:
    branches: [master, main, "codex/**"]
  pull_request:
  workflow_dispatch:

concurrency:
  group: windows-verify-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    runs-on: windows-latest
    timeout-minutes: 45
    env:
      CI: "1"
      CSC_IDENTITY_AUTO_DISCOVERY: "false"
      ELECTRON_DISABLE_SECURITY_WARNINGS: "1"
      CODEARTS_BAR_VSCODE_VERSION: "stable"
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Dependency audit
        run: npm audit

      - name: Unit, smoke, E2E and visual verification
        run: npm run verify:ci

      - name: Build VS Code extension
        run: npm run build:extension

      - name: Build Windows installer and portable app
        run: npm run build:app:built

      - name: Verify packaged application
        run: |
          npm run smoke:app-asar
          npm run smoke:package-resources

      - name: Build npm package
        run: npm run pack:npm

      - name: Upload visual differences
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: visual-regression-diff
          path: .cache/visual-regression
          if-no-files-found: ignore

      - name: Upload release candidates
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: codearts-bar-windows-${{ github.sha }}
          path: |
            dist/CodeArts-Bar-Setup-*-x64.exe
            dist/CodeArts-Bar-Portable-*-x64.exe
            release/codearts-bar-status.vsix
            release/codearts-bar-*.tgz
          if-no-files-found: error
          retention-days: 7
