name: GitHub Release

on:
  push:
    tags: ["CodeArts-Bar-*"]

permissions:
  contents: write

concurrency:
  group: github-release-${{ github.ref }}
  cancel-in-progress: false

env:
  CI: "1"
  CSC_IDENTITY_AUTO_DISCOVERY: "false"
  ELECTRON_DISABLE_SECURITY_WARNINGS: "1"
  CODEARTS_BAR_NOW_MS: "1783512000000"
  SOURCE_DATE_EPOCH: "1783512000"

jobs:
  release:
    runs-on: windows-latest
    timeout-minutes: 90
    steps:
      - uses: actions/checkout@v4
        with: { fetch-depth: 0 }
      - uses: actions/setup-node@v4
        with: { node-version: 24, cache: npm }
      - uses: actions/setup-java@v4
        with: { distribution: temurin, java-version: "21", cache: gradle }
      - run: npm ci
      - name: Validate tag and package version
        shell: pwsh
        run: |
          $version = (Get-Content package.json -Raw | ConvertFrom-Json).version
          $expected = "CodeArts-Bar-$version"
          if ($env:GITHUB_REF_NAME -ne $expected) { throw "Tag $env:GITHUB_REF_NAME must equal $expected" }
          "RELEASE_VERSION=$version" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
      - run: npm audit --audit-level=high
      - run: npm test
      - run: npm run e2e:electron:built
      - run: npm run e2e:vscode
      - run: npm run stress:dashboard
      - run: npm run stress:pagination
      - run: npm run stress:aggregation
      - run: npm run verify:jetbrains
      - name: Build verified release artifacts
        shell: pwsh
        env:
          CODEARTS_BAR_SKIP_JETBRAINS_VERIFY: "1"
        run: node src/release.js
      - name: Upload release build evidence
        uses: actions/upload-artifact@v4
        with:
          name: codearts-bar-release-${{ github.sha }}
          path: release/*
          if-no-files-found: error
          retention-days: 30
      - name: Publish GitHub Release
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          $assets = Get-ChildItem release -File | Where-Object { $_.Name -ne 'RELEASE_NOTES.md' } | ForEach-Object { $_.FullName }
          gh release create $env:GITHUB_REF_NAME $assets --verify-tag --title "CodeArts Bar $env:RELEASE_VERSION" --notes-file release/RELEASE_NOTES.md
