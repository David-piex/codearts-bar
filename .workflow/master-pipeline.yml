version: '1.0'
name: master-pipeline
displayName: Master Verify
stages:
  - stage:
    name: verify
    displayName: Verify and Package
    steps:
      - step: build@nodejs
        name: verify_nodejs
        displayName: Test and Build
        nodeVersion: 22.14.0
        commands:
          - export CODEARTS_BAR_DB="$PWD/tests/fixtures/opencode-fixture.db"
          - export CODEARTS_BAR_CONFIG_DIR="$PWD/.cache/gitee-config"
          - npm ci
          - npm audit
          - npm test
          - npm run stress:dashboard
          - npm run stress:pagination
          - npm run stress:aggregation
          - npm run build:extension
          - npm run pack:npm
        caches:
          - ~/.npm
        artifacts:
          - name: RELEASE_CANDIDATES
            path:
              - ./release/codearts-bar-status.vsix
              - ./release/codearts-bar-*.tgz
        strategy:
          retry: '0'
triggers:
  push:
    branches:
      include:
        - master
